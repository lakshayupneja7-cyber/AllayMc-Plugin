settings:
  timer-check-seconds: 1
  save-on-quit: true
  restore-normal-location-on-free: true

exile:
  world: "world"
  random-spawn: true
  min-radius: 2000000
  max-radius: 2200000
  safe-teleport-tries: 100
  avoid-water: true
  avoid-lava: true
  avoid-leaves: true

return-location:
  use-config-return-if-normal-location-missing: true
  world: "world"
  x: 0.5
  y: 64.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

inventory:
  keep-separate-exile-inventory: true
  clear-player-on-exile: true
  restore-normal-on-free: true

border:
  enabled: true
  initial-size: 64.0
  max-size: 2048.0
  damage-buffer: 5.0
  damage-amount: 0.2
  warning-distance: 8
  warning-time: 10

punishments:
  exileremove:
    mode: "kick"
    kick-message: "&cYou have been permanently removed from the server."
    ban-reason: "Removed from server by exile punishment."

formats:
  default-time-unit: "m"
