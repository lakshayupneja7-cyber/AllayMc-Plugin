name: AllayMc
version: 1.1.0
main: com.allaymc.exile.AllayMcPlugin
api-version: "1.21"
author: AllayMc
description: Exile system plugin with random exile spawns, separate exile inventory and personal exile borders
softdepend: [LuckPerms]

commands:
  exile:
    description: Check your exile status or another player's exile status
    usage: /exile [player]
    permission: allaymc.exile.self

  exileadd:
    description: Exile a player for a time
    usage: /exileadd <player> <time> [reason]
    permission: allaymc.exile.add

  exilefree:
    description: Free a player from exile
    usage: /exilefree <player>
    permission: allaymc.exile.free

  exileextend:
    description: Extend exile time
    usage: /exileextend <player> <time>
    permission: allaymc.exile.extend

  exileremove:
    description: Permanently remove a player from the server
    usage: /exileremove <player>
    permission: allaymc.exile.remove

  exilecount:
    description: Check how many times a player was exiled
    usage: /exilecount <player>
    permission: allaymc.exile.count

  exileborder:
    description: Manage an exiled player's personal border
    usage: /exileborder <player> | /exileborder <set|expand|shrink|reset|center> <player> [value]
    permission: allaymc.exile.border.view

permissions:
  allaymc.exile.self:
    default: true

  allaymc.exile.others:
    default: op

  allaymc.exile.add:
    default: op

  allaymc.exile.free:
    default: op

  allaymc.exile.extend:
    default: op

  allaymc.exile.remove:
    default: op

  allaymc.exile.count:
    default: op

  allaymc.exile.border.view:
    default: op

  allaymc.exile.border.set:
    default: op

  allaymc.exile.border.expand:
    default: op

  allaymc.exile.border.shrink:
    default: op

  allaymc.exile.border.reset:
    default: op

  allaymc.exile.admin:
    default: op
    children:
      allaymc.exile.others: true
      allaymc.exile.add: true
      allaymc.exile.free: true
      allaymc.exile.extend: true
      allaymc.exile.remove: true
      allaymc.exile.count: true
      allaymc.exile.border.view: true
      allaymc.exile.border.set: true
      allaymc.exile.border.expand: true
      allaymc.exile.border.shrink: true
      allaymc.exile.border.reset: true
